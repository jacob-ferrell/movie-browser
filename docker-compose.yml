services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    restart: unless-stopped
    volumes:
      - /hdd:/hdd
    # Not exposed externally — only reachable by the frontend container

  frontend:
    build: ./frontend
    ports:
      - "8765:80"
    depends_on:
      - backend
    restart: unless-stopped
